<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Curso HTML</title>
</head>
<body>
    
    <h1>Formularios</h1>
    <form>
        
        <label for="email">Seu email</label>
        <input type="email" name="email" id="email" placeholder="Seu email" required> <br> <br>
        
        <label for="pnome">Primeiro Nome</label>
        <input type="text" id="pnome" name="pnome" placeholder="Seu primeiro Nome" required> <br> <br>

        <label for="unome">Ultimo Nome</label>
        <input type="text" id="unome" name="unome" placeholder="Seu ultimo nome" required> <br> <br>

        <!--Tipo RADIO-->
        <label>
            <strong>Qual seu nível como programador atualmente?</strong>
        </label> <br>

        <label>
            <input type="radio" name="nivel" value="iniciante" checked>Iniciante
        </label>
        <label>
            <input type="radio" name="nivel" value="medio">Mediano
        </label>
        <label>
            <input type="radio" name="nivel" value="avancado">Avançado
        </label> <br> <br>

        <!--Tipo Select-->
        <label for="escolaridade">
            <strong>Sua escolaridade:</strong>
        </label>
        <select id="escolaridade" required>
            <option selected disabled value="">Selecione</option>
            <option>Educação básica</option>
            <option>Ensino Médio</option>
            <option>Ensino Superior</option>
        </select> <br> <br>

        <!--Tipo Checkbox-->

        <label>
            <strong>Selecione as tecnologias que voçê conhece:</strong>
        </label> <br> <br>

        <input type="checkbox" name="tecnologia1" id="tecnologia1" value="HTML">
        <label for="tecnologia1">HTML</label>

        <input type="checkbox" name="tecnologia2" id="tecnologia2" value="CSS">
        <label for="tecnologia2">CSS</label>

        <input type="checkbox" name="tecnologia3" id="tecnologia3" value="JavaScript">
        <label for="tecnologia3">JavaScript</label>

        <input type="checkbox" name="tecnologia4" id="tecnologia4" value="PHP">
        <label for="tecnologia4">PHP</label>
        <br> <br>
        
        <!--Tipo Date-->

        <label for="nascimento">Data nascimento:</label>
        <input type="date" name="nascimento" id="nascimento">

        <br> <br>
        <input type="submit" value="Cadastrar">

    </form>

</body>
</html>
