<!DOCTYPE html>

    <title>Login - Dev Mentor BR</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    
    <main class="container">

        <section class="left">
            <h1>Minha conta</h1>

            <form class="form">
                <input class="input" type="email" name="" id="" placeholder="Digite seu email...">    

                <input class="input" type="password" name="" id="" placeholder="Digite sua senha...">    

                <button class="button" type="submit">Criar conta</button>
            </form>

            <div class="area">
                <span class="link">Novo por aqui? <a href="signup.html">Cadastre-se</a></span>
            </div>

        </section>

        <section class="right">
            <img class="info-img" src="images/info.png" alt="Informações do projeto">

            <h2 class="subtitle">Leve sua carreira ao próximo nível.</h2>
            <p class="description">
                Lorem ipsum dolor sit amet consectetur adipisicing elit. Sunt, vel molestiae aspernatur excepturi ratione illum? Nostrum voluptatem maiores iure!
            </p>
        </section>

    </main>
