<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Pagina Login</title>
</head>
<body>

    <main class="container">

        <div class="column left">
            <div class="new-user">
                <h1>Minha conta</h1>

                <form action="">

                    <label for="email"></label>
                    <input type="email" name="email" id="email" placeholder="Digite seu email" required>

                    <label for="password"></label>
                    <input type="password" name="password" id="password" placeholder="Digite sua senha" required>

                    <input type="submit" value="Acessar">
                    
                    <p>Novo por aqui? <a href="new-user.html">Cadastre-se.</a></p>
                </form>

            </div>
        </div>

        <div class="column right">
            <div class="img-text">
                <img src="images/info.png" alt="Imagem de servidor">

                <h1>Leve sua carreira ao próximo nivel.</h1>
                <p>Lorem ipsum dolor sit amet consectetur adipisicing elit. Corrupti ut accusantium autem maiores aliquam.</p>
            </div>
        </div>

    </main>
    
</body>
</html>
