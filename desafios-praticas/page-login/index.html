<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Pagina Login</title>
</head>
<body>

    <main class="container">

        <div class="column left">
            <div class="form">
                <h1>Nova conta</h1>

                <form action="">
                    <label for="name"></label>
                    <input type="text" name="name" id="name" placeholder="Nome completo">

                    <label for="email"></label>
                    <input type="email" name="email" id="email" placeholder="Digite seu email">

                    <label for="password"></label>
                    <input type="password" name="password" id="password" placeholder="Digite sua senha">

                    <input type="checkbox" name="terms" id="terms">
                    <label for="terms">Concordo com os termos.</label>

                    <input type="submit" value="Criar conta">
                </form>

                <p>Já possui uma conta? <a href="#">Faça login</a></p>
            </div>
        </div>

        <div class="column right">
            <div class="img-text">
                <img src="images/info.png" alt="Imagem de servidor">

                <h1>Leve sua carreira ao próximo nivel.</h1>
                <p>Lorem ipsum dolor sit amet consectetur adipisicing elit. Corrupti ut accusantium autem maiores aliquam a, perspiciatis cupiditate dolor quia reiciendis sequi mollitia sint! Unde, quis nobis? Quas eos cum suscipit?</p>
            </div>
        </div>

    </main>
    
</body>
</html>
